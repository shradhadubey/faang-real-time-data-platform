name: FAANG Data Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.11"
  TF_VERSION: "1.6.0"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Python lint + unit tests
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            ruff \
            mypy \
            pytest \
            pytest-cov \
            boto3 \
            pyspark==3.5.0 \
            great-expectations \
            apache-airflow==2.8.0 \
            apache-airflow-providers-amazon

      - name: Lint with Ruff
        run: |
          ruff check . --output-format=github
          ruff format . --check

      - name: Type check with mypy
        run: |
          mypy data-generator/ streaming/ batch/ \
            --ignore-missing-imports \
            --no-strict-optional

      - name: Run unit tests
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Terraform validate & plan
  # ──────────────────────────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: infrastructure/terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init (with backend disabled for validation)
        working-directory: infrastructure/terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infrastructure/terraform
        run: terraform validate

      - name: Configure AWS credentials (plan only on PRs)
        if: github.event_name == 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Plan (PR only)
        if: github.event_name == 'pull_request'
        working-directory: infrastructure/terraform
        run: |
          terraform init
          terraform plan \
            -var="environment=dev" \
            -no-color \
            -out=tfplan
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.existsSync('infrastructure/terraform/tfplan')
              ? 'Plan file generated — check workflow logs for details'
              : 'Plan step skipped or failed';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${plan}\n\`\`\``
            });

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: SQL validation
  # ──────────────────────────────────────────────────────────────────────────
  sql-validate:
    name: SQL Lint
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Lint SQL files
        run: |
          sqlfluff lint sql/ \
            --dialect ansi \
            --rules L001,L002,L003,L010,L014,L019,L028,L030,L031

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4: Deploy to dev (main branch pushes only)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [test, terraform-validate, sql-validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Apply (Dev)
        working-directory: infrastructure/terraform
        run: |
          terraform init
          terraform apply \
            -var="environment=dev" \
            -auto-approve

      - name: Upload PySpark scripts to S3
        run: |
          BUCKET=$(terraform -chdir=infrastructure/terraform output -raw s3_bucket_name)
          aws s3 cp streaming/spark_streaming_job.py  s3://$BUCKET/scripts/
          aws s3 cp batch/aggregation_job.py           s3://$BUCKET/scripts/
          aws s3 cp data_quality/great_expectations_suite.py s3://$BUCKET/scripts/

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ FAANG Data Platform deployed to *dev* by ${{ github.actor }}",
              "attachments": [{
                "color": "good",
                "fields": [
                  {"title": "Branch", "value": "${{ github.ref_name }}", "short": true},
                  {"title": "Commit", "value": "${{ github.sha }}", "short": true}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ FAANG Data Platform deploy FAILED — ${{ github.actor }}",
              "attachments": [{"color": "danger"}]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ──────────────────────────────────────────────────────────────────────────
  # Job 5: Security scan
  # ──────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: filesystem
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Detect secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
